<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>バカなカバの大冒険</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { image-rendering: pixelated; border: 2px solid #2d4538; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 160,
    height: 144,
    zoom: 3,
    pixelArt: true,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

function preload() {
    // 読み込みエラーが起きても止まらないように設定
    this.load.on('loaderror', (file) => {
        console.warn('ファイルの読み込みに失敗しました: ' + file.src);
    });

    // ここで画像を読み込み（ファイル名はすべて小文字で統一してください）
    this.load.image('map', 'map.png');
    this.load.image('hippo', 'hippo.png');
    this.load.image('npc', 'npc.png');
    this.load.audio('myMusic', 'your_song.mp3');
}

let player;
let npc;
let music;
let musicStarted = false;
let targetPos = { x: 80, y: 72 };

function create() {
    // 1. 背景の描画
    // map.pngがあれば表示、なければ緑の塗りつぶし
    if (this.textures.exists('map')) {
        this.add.image(80, 72, 'map');
    } else {
        this.add.rectangle(80, 72, 160, 144, 0x8bac0f).setOrigin(0.5);
        this.add.text(10, 10, 'MAP MISSING', { fontSize: '8px', fill: '#306230' });
    }

    // 2. NPCの作成
    if (this.textures.exists('npc')) {
        npc = this.physics.add.staticSprite(120, 50, 'npc');
    } else {
        npc = this.add.rectangle(120, 50, 16, 16, 0x306230);
        this.physics.add.existing(npc, true);
    }

    // 3. プレイヤー（カバ）の作成
    if (this.textures.exists('hippo')) {
        player = this.physics.add.sprite(80, 72, 'hippo');
    } else {
        player = this.add.rectangle(80, 72, 16, 16, 0x0f380f);
        this.physics.add.existing(player);
    }
    player.body.setCollideWorldBounds(true);

    // 4. 音楽の設定
    if (this.cache.audio.exists('myMusic')) {
        music = this.sound.add('myMusic');
    }

    // 5. 衝突判定（重なったら音を鳴らす）
    this.physics.add.overlap(player, npc, () => {
        if (!musicStarted && music) {
            music.play({ loop: true });
            musicStarted = true;
            alert("「こんにちは！私の作った曲を聴いてね！」");
        }
    });

    // 6. 操作（画面をタップしたところへ歩く）
    this.input.on('pointerdown', (pointer) => {
        // ブラウザの音ブロックを解除
        if (this.sound.context.state === 'suspended') {
            this.sound.context.resume();
        }
        
        targetPos.x = pointer.worldX;
        targetPos.y = pointer.worldY;
        this.physics.moveTo(player, targetPos.x, targetPos.y, 60);
    });
}

function update() {
    if (player && player.body) {
        const distance = Phaser.Math.Distance.Between(player.x, player.y, targetPos.x, targetPos.y);
        if (distance < 4) {
            player.body.reset(player.x, player.y);
        }
    }
}
</script>
</body>
</html>
