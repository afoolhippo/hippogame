<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カバのレトロ冒険</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { image-rendering: pixelated; } /* ドットをくっきりさせる */
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 160,
    height: 144,
    zoom: 3, // 画面を3倍に拡大して表示
    pixelArt: true,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

function preload() {
    // 画像や音源の読み込み（パスは自分のファイルに合わせて変更してください）
    this.load.image('hippo', 'hippo.png'); // 主人公カバ
    this.load.image('npc', 'npc.png');     // 話しかけるキャラ
    this.load.audio('myMusic', 'your_song.mp3'); // あなたが作った曲
}

let player;
let npc;
let music;
let musicStarted = false;

function create() {
    // 1. カバ（プレイヤー）の作成
    player = this.physics.add.sprite(80, 72, 'hippo');
    player.setCollideWorldBounds(true);

    // 2. NPC（話しかける相手）の作成
    npc = this.physics.add.staticSprite(120, 50, 'npc');

    // 3. 音楽の準備
    music = this.sound.add('myMusic');

    // 4. 重なり判定（接触したら音楽を流す）
    this.physics.add.overlap(player, npc, () => {
        if (!musicStarted) {
            music.play({ loop: true });
            musicStarted = true;
            alert("「こんにちは！私の好きな曲を流すね」");
        }
    }, null, this);

    // 5. スマホ操作用の簡易タッチ移動（画面をタップした方向へ移動）
    this.input.on('pointerdown', (pointer) => {
        this.physics.moveToObject(player, pointer, 60);
    });
}

function update() {
    // 目的地に近づいたら停止
    const distance = Phaser.Math.Distance.Between(player.x, player.y, this.input.activePointer.x, this.input.activePointer.y);
    if (distance < 4) {
        player.body.reset(player.x, player.y);
    }
}
</script>
</body>
</html>
