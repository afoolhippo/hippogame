<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>バカなカバの大冒険</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 160,
    height: 144,
    zoom: 3, 
    pixelArt: true,
    physics: { 
        default: 'arcade',
        arcade: { debug: false } 
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

function preload() {
    // 【重要】ファイル名がすべて小文字であることを確認してください
    this.load.image('map', 'map.png');
    this.load.image('hippo', 'hippo.png');
    this.load.image('npc', 'npc.png');
    this.load.audio('myMusic', 'your_song.mp3');
}

let player;
let npc;
let music;
let musicStarted = false;
let targetPos = null; // 移動先を保持

function create() {
    // 1. 背景（マップ）を配置（中心点 80, 72 に配置）
    this.add.image(80, 72, 'map');

    // 2. NPCの作成（カバより先に描画して、カバが上に重なるようにする）
    npc = this.physics.add.staticSprite(120, 50, 'npc');

    // 3. カバ（プレイヤー）の作成
    player = this.physics.add.sprite(80, 72, 'hippo');
    player.setCollideWorldBounds(true);

    // 4. 音楽の準備
    music = this.sound.add('myMusic');

    // 5. 接触判定
    this.physics.add.overlap(player, npc, () => {
        if (!musicStarted) {
            // ブラウザの制限対策：何らかの音が鳴る前にユーザーの操作が必要
            if (this.sound.context.state === 'suspended') {
                this.sound.context.resume();
            }
            music.play({ loop: true });
            musicStarted = true;
            alert("「こんにちは！私の好きな曲を流すね」");
        }
    }, null, this);

    // 6. スマホ操作（タップした場所を目的地にする）
    this.input.on('pointerdown', (pointer) => {
        targetPos = { x: pointer.worldX, y: pointer.worldY };
        this.physics.moveTo(player, targetPos.x, targetPos.y, 60);
    });
}

function update() {
    // 目的地に近づいたらピタッと止める処理
    if (targetPos) {
        const distance = Phaser.Math.Distance.Between(player.x, player.y, targetPos.x, targetPos.y);
        if (distance < 4) {
            player.body.reset(player.x, player.y);
            targetPos = null;
        }
    }
}
</script>
</body>
</html>
