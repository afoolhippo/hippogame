<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>バカなカバの大冒険</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { image-rendering: pixelated; border: 2px solid #2d4538; }
    </style>
</head>
<body>
<script>
// --- シーン1: タイトル画面 ---
class TitleScene extends Phaser.Scene {
    constructor() { super('TitleScene'); }

    preload() {
        this.load.image('title', 'title.png');
    }

    create() {
        // タイトル画像の表示
        if (this.textures.exists('title')) {
            let bg = this.add.image(80, 72, 'title');
        } else {
            this.add.text(20, 60, 'バカなカバの大冒険\n(CLICK TO START)', { fontSize: '10px', fill: '#fff', align: 'center' });
        }

        // 画面をクリックしたらメインゲームへ
        this.input.on('pointerdown', () => {
            this.scene.start('MainScene');
        });
    }
}

// --- シーン2: メインゲーム ---
class MainScene extends Phaser.Scene {
    constructor() { super('MainScene'); }

    preload() {
        this.load.image('map', 'map.png');
        this.load.image('hippo', 'hippo.png');
        this.load.image('npc', 'npc.png');
    }

    create() {
        // マップ配置
        this.add.image(80, 72, 'map');

        // NPC配置
        this.npc = this.physics.add.staticSprite(120, 50, 'npc');

        // プレイヤー配置
        this.player = this.physics.add.sprite(80, 72, 'hippo');
        this.player.setCollideWorldBounds(true);

        // 会話中かどうかのフラグ
        this.isTalking = false;

        // 衝突判定
        this.physics.add.overlap(this.player, this.npc, () => {
            if (!this.isTalking) {
                this.isTalking = true;
                this.player.body.setVelocity(0);
                alert("カバ「こんにちは！冒険に出るぞ！」");
                // アラートを閉じたら少し離す（連続発生防止）
                this.player.x -= 5;
                this.isTalking = false;
            }
        });

        // 移動用ターゲット（目的地）
        this.target = new Phaser.Math.Vector2(this.player.x, this.player.y);
    }

    update() {
        if (this.isTalking) return;

        // タップした場所に向かって移動（簡易上下左右移動）
        if (this.input.activePointer.isDown) {
            this.target.x = this.input.activePointer.worldX;
            this.target.y = this.input.activePointer.worldY;
            this.physics.moveToObject(this.player, this.target, 60);
        } else {
            // 指を離したら止まる
            const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.target.x, this.target.y);
            if (dist < 4) {
                this.player.body.setVelocity(0);
            }
        }
    }
}

// --- ゲーム全体のコンフィグ ---
const config = {
    type: Phaser.AUTO,
    width: 160,
    height: 144,
    zoom: 3,
    pixelArt: true,
    physics: { default: 'arcade' },
    scene: [TitleScene, MainScene] // タイトルを先に読み込む
};

const game = new Phaser.Game(config);
</script>
</body>
</html>
