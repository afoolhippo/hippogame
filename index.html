<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>バカなカバの大冒険</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { image-rendering: pixelated; border: 2px solid #2d4538; }
    </style>
</head>
<body>
<script>
// --- メインゲームシーン ---
class MainScene extends Phaser.Scene {
    constructor() { super('MainScene'); }

    preload() {
        // 画像読み込みとエラーチェック
        this.load.image('map', 'map.png');
        this.load.image('hippo', 'hippo.png');
        this.load.image('npc', 'npc.png');

        this.load.on('loaderror', (file) => {
            console.error('読み込み失敗：' + file.key + '（パス: ' + file.src + '）');
            console.error('GitHub上のファイル名と大文字・小文字まで一致しているか確認してください。');
        });
    }

    create() {
        // 1. マップ表示（読み込めていない場合は緑の背景）
        if (this.textures.exists('map')) {
            this.add.image(80, 72, 'map');
        } else {
            this.add.rectangle(80, 72, 160, 144, 0x8bac0f);
        }

        // 2. キャラクター配置
        this.npc = this.physics.add.staticSprite(120, 50, 'npc');
        this.player = this.physics.add.sprite(80, 72, 'hippo');
        this.player.setCollideWorldBounds(true);

        // 3. メッセージウィンドウの作成（最初は隠しておく）
        this.msgBox = this.add.container(0, 100).setDepth(10).setVisible(false);
        let rect = this.add.rectangle(80, 20, 150, 40, 0x000000).setStrokeStyle(1, 0xffffff);
        this.msgText = this.add.text(15, 5, '', { fontSize: '10px', fill: '#fff', wordWrap: { width: 130 } });
        this.msgBox.add([rect, this.msgText]);

        // 4. 衝突判定
        this.physics.add.overlap(this.player, this.npc, () => {
            this.showMessage("カバ「こんにちは！冒険に出るぞ！」");
        });

        this.target = new Phaser.Math.Vector2(this.player.x, this.player.y);
    }

    // メッセージを表示する関数
    showMessage(text) {
        if (this.msgBox.visible) return;
        this.msgBox.setVisible(true);
        this.msgText.setText(text);
        this.player.body.setVelocity(0);

        // 2秒後に自動で閉じる
        this.time.delayedCall(2000, () => {
            this.msgBox.setVisible(false);
            this.player.x -= 5; // 重なり回避
        });
    }

    update() {
        if (this.msgBox.visible) return; // 会話中は動けない

        if (this.input.activePointer.isDown) {
            this.target.x = this.input.activePointer.worldX;
            this.target.y = this.input.activePointer.worldY;
            this.physics.moveToObject(this.player, this.target, 60);
        } else {
            if (Phaser.Math.Distance.Between(this.player.x, this.player.y, this.target.x, this.target.y) < 4) {
                this.player.body.setVelocity(0);
            }
        }
    }
}

// タイトルシーン（簡易版）
class TitleScene extends Phaser.Scene {
    constructor() { super('TitleScene'); }
    preload() { this.load.image('title', 'title.png'); }
    create() {
        if (this.textures.exists('title')) { this.add.image(80, 72, 'title'); }
        else { this.add.text(30, 60, 'TITLE SCREEN\nCLICK TO START', { fontSize: '10px' }); }
        this.input.on('pointerdown', () => this.scene.start('MainScene'));
    }
}

const config = {
    type: Phaser.AUTO,
    width: 160,
    height: 144,
    zoom: 3,
    pixelArt: true,
    physics: { default: 'arcade' },
    scene: [TitleScene, MainScene]
};
const game = new Phaser.Game(config);
</script>
</body>
</html>
